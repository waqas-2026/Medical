      { id: 6, name: "Azithromycin 500mg", category: "Tablet", stock: 60, price: 15.0, supplier: "Cipla", supplierPhone: "9123456789", minStock: 20, expiry: "2026-09-30" },
      { id: 7, name: "Atorvastatin 10mg", category: "Tablet", stock: 90, price: 7.0, supplier: "Lupin", supplierPhone: "9765432100", minStock: 30, expiry: "2027-02-28" },
      { id: 8, name: "Pantoprazole 40mg", category: "Tablet", stock: 12, price: 6.5, supplier: "Zydus Cadila", supplierPhone: "9654321098", minStock: 25, expiry: "2026-10-15" },
    ];

    const TABS = ["Dashboard", "Inventory", "Billing", "Orders", "Low Stock Alert"];

    function App() {
      const [inventory, setInventory] = useState(initialInventory);
      const [activeTab, setActiveTab] = useState("Dashboard");
      const [searchTerm, setSearchTerm] = useState("");
      const [cart, setCart] = useState([]);
      const [bills, setBills] = useState([]);
      const [patientName, setPatientName] = useState("");
      const [patientPhone, setPatientPhone] = useState("");
      const [orders, setOrders] = useState([]);
      const [orderQty, setOrderQty] = useState({});
      const [showBillPreview, setShowBillPreview] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);
      const [newMed, setNewMed] = useState({ name: "", category: "Tablet", stock: "", price: "", supplier: "", supplierPhone: "", minStock: "", expiry: "" });
      const [editId, setEditId] = useState(null);
      const [notification, setNotification] = useState(null);
      const billRef = useRef(null);

      const lowStockItems = inventory.filter(i => i.stock <= i.minStock);
      const outOfStock = inventory.filter(i => i.stock === 0);

      const showNotif = (msg, type = "success") => {
        setNotification({ msg, type });
        setTimeout(() => setNotification(null), 3000);
      };
      const filteredInventory = inventory.filter(i =>
        i.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
        i.category.toLowerCase().includes(searchTerm.toLowerCase())
      );

      const addToCart = (item) => {
        if (item.stock === 0) { showNotif("Yeh dawai stock mein nahi hai!", "error"); return; }
        const existing = cart.find(c => c.id === item.id);
        if (existing) {
          if (existing.qty >= item.stock) { showNotif("Itni quantity stock mein nahi hai!", "error"); return; }
          setCart(cart.map(c => c.id === item.id ? { ...c, qty: c.qty + 1 } : c));
        } else {
          setCart([...cart, { ...item, qty: 1 }]);
        }
      };

      const removeFromCart = (id) => setCart(cart.filter(c => c.id !== id));
      const updateCartQty = (id, qty) => {
        const item = inventory.find(i => i.id === id);
        if (qty > item.stock) { showNotif("Stock mein itni quantity nahi!", "error"); return; }
        if (qty <= 0) { removeFromCart(id); return; }
        setCart(cart.map(c => c.id === id ? { ...c, qty } : c));
      };

      const totalAmount = cart.reduce((s, c) => s + c.price * c.qty, 0);
      const gst = totalAmount * 0.05;
      const grandTotal = totalAmount + gst;

      const generateBill = () => {
        if (!patientName) { showNotif("Patient ka naam daalna zaroori hai!", "error"); return; }
        if (cart.length === 0) { showNotif("Cart mein koi item nahi!", "error"); return; }
        const bill = {
          id: `BILL-${Date.now()}`,
          date: new Date().toLocaleString("hi-IN"),
          patient: patientName,
          phone: patientPhone,
          items: [...cart],
          subtotal: totalAmount,
          gst,
          total: grandTotal,
        };
        setBills([bill, ...bills]);
        setInventory(inventory.map(i => {
          const cartItem = cart.find(c => c.id === i.id);
          return cartItem ? { ...i, stock: i.stock - cartItem.qty } : i;
        }));
        setCart([]);
        setPatientName("");
        setPatientPhone("");        setShowBillPreview(bill);
        showNotif("Bill successfully generate ho gaya!");
      };

      const placeOrder = () => {
        const orderItems = lowStockItems.filter(i => orderQty[i.id] && orderQty[i.id] > 0);
        if (orderItems.length === 0) { showNotif("Koi item select nahi kiya order ke liye!", "error"); return; }
        const order = {
          id: `ORD-${Date.now()}`,
          date: new Date().toLocaleString("hi-IN"),
          status: "Placed",
          items: orderItems.map(i => ({ ...i, orderQty: orderQty[i.id] })),
        };
        setOrders([order, ...orders]);
        setOrderQty({});
        showNotif(`Order ${order.id} successfully place ho gaya!`);
      };

      const exportExcel = () => {
        const headers = ["ID", "Dawai Ka Naam", "Category", "Stock", "Price (₹)", "Supplier", "Phone", "Min Stock", "Expiry Date", "Status"];
        const rows = inventory.map(i => [
          i.id, i.name, i.category, i.stock, i.price, i.supplier, i.supplierPhone, i.minStock, i.expiry,
          i.stock === 0 ? "OUT OF STOCK" : i.stock <= i.minStock ? "LOW STOCK" : "OK"
        ]);
        let csv = headers.join(",") + "\n";
        rows.forEach(r => { csv += r.join(",") + "\n"; });
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = "Khan_Medicos_Inventory.csv"; a.click();
        showNotif("Excel sheet download ho rahi hai!");
      };

      const saveEdit = () => {
        if (!newMed.name || !newMed.price || !newMed.stock) { showNotif("Saari zaruri fields bharo!", "error"); return; }
        if (editId) {
          setInventory(inventory.map(i => i.id === editId ? { ...i, ...newMed, price: +newMed.price, stock: +newMed.stock, minStock: +newMed.minStock } : i));
          showNotif("Dawai update ho gayi!");
        } else {
          setInventory([...inventory, { ...newMed, id: Date.now(), price: +newMed.price, stock: +newMed.stock, minStock: +newMed.minStock }]);
          showNotif("Nayi dawai add ho gayi!");
        }
        setShowAddModal(false);
        setNewMed({ name: "", category: "Tablet", stock: "", price: "", supplier: "", supplierPhone: "", minStock: "", expiry: "" });
        setEditId(null);
      };

      const openEdit = (item) => {
        setEditId(item.id); setNewMed({ ...item }); setShowAddModal(true);
      };
      const printBill = () => {
        setTimeout(() => {
          window.print();
        }, 100);
      };

      return (
        <div style={{ fontFamily: "'Noto Sans', sans-serif", minHeight: "100vh", background: "#0f1117", color: "#e8eaf6" }}>
          {/* Notification */}
          {notification && (
            <div className="notif" style={{ background: notification.type === "error" ? "#b71c1c" : "#1b5e20" }}>
              {notification.type === "error" ? "⚠️" : "✅"} {notification.msg}
            </div>
          )}

          {/* Header */}
          <div className="no-print" style={{ background: "linear-gradient(90deg, #1a1d2e, #0f1117)", borderBottom: "1px solid rgba(255,255,255,0.08)", padding: "0 24px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 72 }}>
            <div className="header-logo">
              <div className="logo-icon">💊</div>
              <div>
                <div className="brand-name">Khan Medicos</div>
                <div className="brand-subtitle">Trusted Medical Store Since 1995</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {lowStockItems.length > 0 && (
                <div className="alert-badge alert-low" onClick={() => setActiveTab("Low Stock Alert")}>
                  🔴 {lowStockItems.length} Low Stock
                </div>
              )}
              {outOfStock.length > 0 && (
                <div className="alert-badge alert-out" onClick={() => setActiveTab("Low Stock Alert")}>
                  ⚠️ {outOfStock.length} Out of Stock
                </div>
              )}
            </div>
          </div>

          {/* Tabs */}
          <div className="tabs-container no-print">
            {TABS.map(t => (
              <button 
                key={t} 
                className={`tab-button ${activeTab === t ? 'active' : ''}`} 
                onClick={() => setActiveTab(t)}
              >
                {t === "Dashboard" && "📊"}
                {t === "Inventory" && "💊"}
                {t === "Billing" && "🧾"}
                {t === "Orders" && "📦"}                {t === "Low Stock Alert" && (lowStockItems.length > 0 ? "⚠️" : "✅")}
                {t}
                {t === "Low Stock Alert" && lowStockItems.length > 0 && ` (${lowStockItems.length})`}
              </button>
            ))}
          </div>

          <div className="container no-print">
            {/* DASHBOARD */}
            {activeTab === "Dashboard" && (
              <div>
                <div className="section-title">📊 Dashboard</div>
                
                <div className="welcome-banner">
                  <div className="welcome-icon">🏥</div>
                  <div className="welcome-text">
                    <h3>Welcome to Khan Medicos</h3>
                    <p>Manage your medical inventory, billing, and orders efficiently. Stay updated with stock alerts and never run out of essential medicines.</p>
                  </div>
                </div>
                
                <div className="dashboard-grid">
                  {[
                    { label: "Kul Dawaiyan", val: inventory.length, icon: "💊", c1: "#1a237e", c2: "#283593" },
                    { label: "Total Stock Value", val: `₹${inventory.reduce((s,i)=>s+i.stock*i.price,0).toFixed(0)}`, icon: "💰", c1: "#1b5e20", c2: "#2e7d32" },
                    { label: "Low Stock Items", val: lowStockItems.length, icon: "⚠️", c1: "#e65100", c2: "#f57c00" },
                    { label: "Out of Stock", val: outOfStock.length, icon: "🚫", c1: "#b71c1c", c2: "#c62828" },
                    { label: "Aaj Ke Bills", val: bills.length, icon: "🧾", c1: "#4a148c", c2: "#6a1b9a" },
                    { label: "Placed Orders", val: orders.length, icon: "📦", c1: "#006064", c2: "#00838f" },
                  ].map(s => (
                    <div key={s.label} className="stat-card" style={{ "--c1": s.c1, "--c2": s.c2 }}>
                      <div className="stat-icon">{s.icon}</div>
                      <div className="stat-value">{s.val}</div>
                      <div className="stat-label">{s.label}</div>
                    </div>
                  ))}
                </div>
                
                {lowStockItems.length > 0 && (
                  <div className="card alert-section alert-out-section">
                    <div className="alert-title alert-out-title">🔴 Urgent — Inhe abhi order karo!</div>
                    <table>
                      <thead>
                        <tr>
                          <th>Dawai</th>
                          <th>Stock</th>
                          <th>Min Required</th>
                          <th>Supplier</th>
                          <th>Phone</th>
                        </tr>                      </thead>
                      <tbody>
                        {lowStockItems.map(i => (
                          <tr key={i.id}>
                            <td style={{ fontWeight: 600 }}>{i.name}</td>
                            <td>
                              <span className={i.stock === 0 ? "badge-out" : "badge-low"}>
                                {i.stock}
                              </span>
                            </td>
                            <td>{i.minStock}</td>
                            <td>{i.supplier}</td>
                            <td>
                              <a href={`tel:${i.supplierPhone}`} className="supplier-link">
                                📞 {i.supplierPhone}
                              </a>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            )}

            {/* INVENTORY */}
            {activeTab === "Inventory" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
                  <div className="section-title">💊 Inventory</div>
                  <div className="header-actions">
                    <div className="search-container">
                      <span className="search-icon">🔍</span>
                      <input 
                        className="inp search-input" 
                        placeholder="Dawai ya category dhundo..." 
                        value={searchTerm} 
                        onChange={e => setSearchTerm(e.target.value)} 
                      />
                    </div>
                    <button className="btn-primary" onClick={() => { setShowAddModal(true); setEditId(null); setNewMed({ name: "", category: "Tablet", stock: "", price: "", supplier: "", supplierPhone: "", minStock: "", expiry: "" }); }}>
                      + Nayi Dawai
                    </button>
                    <button className="btn-secondary" onClick={exportExcel}>📥 Excel Export</button>
                  </div>
                </div>
                
                <div className="card" style={{ overflow: "auto" }}>
                  <table>                    <thead>
                      <tr>
                        <th>Dawai Ka Naam</th>
                        <th>Category</th>
                        <th>Stock</th>
                        <th>Price</th>
                        <th>Supplier</th>
                        <th>Phone</th>
                        <th>Expiry</th>
                        <th>Status</th>
                        <th>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredInventory.map(item => (
                        <tr key={item.id}>
                          <td style={{ fontWeight: 600 }}>{item.name}</td>
                          <td><span className="category-badge">{item.category}</span></td>
                          <td style={{ fontWeight: 700, color: item.stock === 0 ? "#ff5252" : item.stock <= item.minStock ? "#ffc107" : "#00e676" }}>
                            {item.stock}
                          </td>
                          <td>₹{item.price.toFixed(2)}</td>
                          <td>{item.supplier}</td>
                          <td>
                            <a href={`tel:${item.supplierPhone}`} className="supplier-link">
                              {item.supplierPhone}
                            </a>
                          </td>
                          <td style={{ color: "#90a4ae", fontSize: 13 }}>{item.expiry}</td>
                          <td>
                            {item.stock === 0 ? (
                              <span className="status-badge status-out">Out of Stock</span>
                            ) : item.stock <= item.minStock ? (
                              <span className="status-badge status-low">Low Stock</span>
                            ) : (
                              <span className="status-badge status-ok">OK</span>
                            )}
                          </td>
                          <td className="action-buttons">
                            <button className="action-btn edit-btn" onClick={() => openEdit(item)}>
                              ✏️ Edit
                            </button>
                            <button className="action-btn add-to-cart-btn" onClick={() => { addToCart(item); setActiveTab("Billing"); }}>
                              🛒 Add
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>                  {filteredInventory.length === 0 && (
                    <div className="empty-state">
                      <div className="empty-state-icon">🔍</div>
                      <div>Koi dawai nahi mili "{searchTerm}" ke liye</div>
                      <div style={{ marginTop: 8, fontSize: 13, color: "#78909c" }}>
                        Search term change karein ya nayi dawai add karein
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* BILLING */}
            {activeTab === "Billing" && (
              <div className="billing-grid">
                <div>
                  <div className="section-title">🧾 Billing</div>
                  
                  <div className="card" style={{ padding: 20, marginBottom: 16 }}>
                    <div style={{ fontWeight: 700, marginBottom: 14, color: "#90caf9" }}>Patient Ki Details</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                      <div>
                        <label className="form-label">Patient Ka Naam *</label>
                        <input className="inp" value={patientName} onChange={e => setPatientName(e.target.value)} placeholder="Naam daalo..." />
                      </div>
                      <div>
                        <label className="form-label">Phone Number</label>
                        <input className="inp" value={patientPhone} onChange={e => setPatientPhone(e.target.value)} placeholder="Phone..." />
                      </div>
                    </div>
                  </div>
                  
                  <div className="card" style={{ padding: 20, marginBottom: 16 }}>
                    <div style={{ fontWeight: 700, marginBottom: 14, color: "#90caf9" }}>Dawai Dhundo & Add Karo</div>
                    <div className="search-container" style={{ marginBottom: 12 }}>
                      <span className="search-icon">🔍</span>
                      <input className="inp search-input" placeholder="Dawai ka naam dhundo..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                    </div>
                    <div style={{ maxHeight: 260, overflowY: "auto", marginTop: 10 }}>
                      {filteredInventory.filter(i => searchTerm).map(item => (
                        <div key={item.id} className="cart-item">
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                            <div>
                              <div style={{ fontWeight: 600, fontSize: 14 }}>{item.name}</div>
                              <div style={{ fontSize: 12, color: "#90a4ae" }}>
                                Stock: <span style={{ color: item.stock === 0 ? "#ff5252" : item.stock <= item.minStock ? "#ffc107" : "#00e676", fontWeight: 700 }}>{item.stock}</span> | ₹{item.price.toFixed(2)}
                              </div>
                            </div>
                            <button className="btn-primary" style={{ fontSize: 12, padding: "6px 14px" }} onClick={() => addToCart(item)}>                              + Add
                            </button>
                          </div>
                        </div>
                      ))}
                      {searchTerm && filteredInventory.filter(i => searchTerm).length === 0 && (
                        <div className="empty-state">
                          <div className="empty-state-icon">🔍</div>
                          <div>Koi dawai nahi mili</div>
                        </div>
                      )}
                    </div>
                  </div>
                  
                  <div className="card" style={{ padding: 20 }}>
                    <div className="history-title">Purane Bills ({bills.length})</div>
                    {bills.length === 0 ? (
                      <div className="empty-state">
                        <div className="empty-state-icon">🧾</div>
                        <div>Abhi koi bill nahi banaya gaya</div>
                        <div style={{ marginTop: 8, fontSize: 13, color: "#78909c" }}>
                          Cart mein items add karke bill generate karein
                        </div>
                      </div>
                    ) : bills.map(b => (
                      <div 
                        key={b.id} 
                        onClick={() => setShowBillPreview(b)} 
                        style={{ 
                          cursor: "pointer", 
                          display: "flex", 
                          justifyContent: "space-between", 
                          padding: "12px 14px", 
                          background: "#252838", 
                          borderRadius: 12, 
                          marginBottom: 8,
                          transition: background 0.2s
                        }}
                        onMouseOver={e => e.currentTarget.style.background = "#2a2d3d"}
                        onMouseOut={e => e.currentTarget.style.background = "#252838"}
                      >
                        <div>
                          <div style={{ fontWeight: 600, fontSize: 14 }}>{b.patient}</div>
                          <div style={{ fontSize: 12, color: "#90a4ae" }}>{b.date} • {b.items.length} items</div>
                        </div>
                        <div style={{ fontWeight: 800, color: "#00e676" }}>₹{b.total.toFixed(2)}</div>
                      </div>
                    ))}
                  </div>
                </div>                
                <div className="cart-sidebar">
                  <div className="card" style={{ padding: 20 }}>
                    <div className="cart-title">🛒 Cart ({cart.length} items)</div>
                    {cart.length === 0 ? (
                      <div className="cart-empty">
                        <div style={{ fontSize: 36, marginBottom: 12 }}>🛒</div>
                        <div>Cart khaali hai</div>
                        <div style={{ marginTop: 8, fontSize: 13, color: "#78909c" }}>
                          Inventory se dawai add karein
                        </div>
                      </div>
                    ) : (
                      <>
                        {cart.map(item => (
                          <div key={item.id} className="cart-item">
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                              <div style={{ fontWeight: 600, fontSize: 14, flex: 1 }}>{item.name}</div>
                              <button className="btn-danger" style={{ fontSize: 11, padding: "3px 10px", marginLeft: 8 }} onClick={() => removeFromCart(item.id)}>
                                ✕
                              </button>
                            </div>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                              <div className="quantity-control">
                                <button className="qty-btn" onClick={() => updateCartQty(item.id, item.qty - 1)}>−</button>
                                <span className="qty-display">{item.qty}</span>
                                <button className="qty-btn" onClick={() => updateCartQty(item.id, item.qty + 1)}>+</button>
                              </div>
                              <div style={{ fontWeight: 700, color: "#00e676" }}>
                                ₹{(item.price * item.qty).toFixed(2)}
                              </div>
                            </div>
                            <div style={{ fontSize: 11, color: "#90a4ae", marginTop: 6 }}>
                              Stock remaining: {item.stock - item.qty}
                            </div>
                          </div>
                        ))}
                        
                        <div className="cart-total-section">
                          <div className="cart-total-row">
                            <span>Subtotal</span>
                            <span>₹{totalAmount.toFixed(2)}</span>
                          </div>
                          <div className="cart-total-row">
                            <span>GST (5%)</span>
                            <span>₹{gst.toFixed(2)}</span>
                          </div>
                          <div className="cart-grand-total">
                            <span>Total</span>
                            <span>₹{grandTotal.toFixed(2)}</span>                          </div>
                        </div>
                        
                        <button className="btn-primary generate-bill-btn" onClick={generateBill}>
                          🧾 Bill Generate Karo
                        </button>
                      </>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* ORDERS */}
            {activeTab === "Orders" && (
              <div>
                <div className="section-title">📦 Order Management</div>
                
                <div className="card" style={{ padding: 20, marginBottom: 20 }}>
                  <div style={{ fontWeight: 700, marginBottom: 14, color: "#90caf9" }}>
                    Nayi Order Banao — Sab suppliers ke saath phone numbers
                  </div>
                  
                  {inventory.map(item => (
                    <div 
                      key={item.id} 
                      className={`order-item ${item.stock <= item.minStock ? 'low-stock' : ''}`}
                    >
                      <div>
                        <div className="order-item-name">{item.name}</div>
                        <div className="order-item-supplier">{item.supplier}</div>
                      </div>
                      <div style={{ fontSize: 13 }}>
                        Stock: <span className={`order-stock ${item.stock === 0 ? 'stock-out' : item.stock <= item.minStock ? 'stock-low' : 'stock-ok'}`}>
                          {item.stock}
                        </span>
                      </div>
                      <div style={{ fontSize: 12, color: "#90a4ae" }}>Min: {item.minStock}</div>
                      <a href={`tel:${item.supplierPhone}`} className="supplier-link">
                        {item.supplierPhone}
                      </a>
                      <input 
                        type="number" 
                        className="inp" 
                        style={{ padding: "8px 12px", fontSize: 13 }} 
                        placeholder="Qty..." 
                        min="0" 
                        value={orderQty[item.id] || ""} 
                        onChange={e => setOrderQty({ ...orderQty, [item.id]: +e.target.value })} 
                      />                      {orderQty[item.id] > 0 && (
                        <span style={{ fontSize: 13, color: "#3d5afe", fontWeight: 700 }}>
                          ₹{(item.price * orderQty[item.id]).toFixed(0)}
                        </span>
                      )}
                    </div>
                  ))}
                  
                  <div className="order-actions">
                    <button className="btn-secondary" onClick={exportExcel}>📥 Excel Export</button>
                    <button className="btn-primary" style={{ padding: "12px 28px" }} onClick={placeOrder}>
                      📦 Order Place Karo
                    </button>
                  </div>
                </div>
                
                {orders.length > 0 && (
                  <div className="card" style={{ padding: 20 }}>
                    <div className="history-title">Order History</div>
                    {orders.map(o => (
                      <div key={o.id} className="order-history-item">
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
                          <div>
                            <span className="order-id">{o.id}</span>
                            <span className="order-date">{o.date}</span>
                          </div>
                          <span className="order-status">✅ {o.status}</span>
                        </div>
                        {o.items.map(i => (
                          <div key={i.id} className="order-item-detail">
                            <strong style={{ color: "#e8eaf6" }}>{i.name}</strong>: {i.orderQty} units from {i.supplier} (📞 {i.supplierPhone})
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* LOW STOCK ALERT */}
            {activeTab === "Low Stock Alert" && (
              <div>
                <div className="section-title">⚠️ Low Stock Alerts</div>
                
                {outOfStock.length > 0 && (
                  <div className="card alert-section alert-out-section">
                    <div className="alert-title alert-out-title">🚫 OUT OF STOCK — Abhi Order Karo!</div>
                    <table>
                      <thead>                        <tr>
                          <th>Dawai</th>
                          <th>Supplier</th>
                          <th>Phone</th>
                          <th>Price</th>
                          <th>Action</th>
                        </tr>
                      </thead>
                      <tbody>
                        {outOfStock.map(i => (
                          <tr key={i.id}>
                            <td style={{ fontWeight: 700 }}>{i.name}</td>
                            <td>{i.supplier}</td>
                            <td>
                              <a href={`tel:${i.supplierPhone}`} className="supplier-link">
                                {i.supplierPhone}
                              </a>
                            </td>
                            <td>₹{i.price.toFixed(2)}</td>
                            <td>
                              <button className="btn-primary" style={{ fontSize: 12, padding: "6px 14px" }} onClick={() => setActiveTab("Orders")}>
                                📦 Order Karo
                              </button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
                
                {lowStockItems.filter(i => i.stock > 0).length > 0 && (
                  <div className="card alert-section alert-low-section">
                    <div className="alert-title alert-low-title">⚠️ Low Stock — Jaldi Order Karo!</div>
                    <table>
                      <thead>
                        <tr>
                          <th>Dawai</th>
                          <th>Current Stock</th>
                          <th>Min Required</th>
                          <th>Supplier</th>
                          <th>Phone</th>
                          <th>Action</th>
                        </tr>
                      </thead>
                      <tbody>
                        {lowStockItems.filter(i => i.stock > 0).map(i => (
                          <tr key={i.id}>
                            <td style={{ fontWeight: 700 }}>{i.name}</td>
                            <td><span className="badge-low">{i.stock}</span></td>                            <td>{i.minStock}</td>
                            <td>{i.supplier}</td>
                            <td>
                              <a href={`tel:${i.supplierPhone}`} className="supplier-link">
                                {i.supplierPhone}
                              </a>
                            </td>
                            <td>
                              <button className="btn-primary" style={{ fontSize: 12, padding: "6px 14px" }} onClick={() => setActiveTab("Orders")}>
                                📦 Order Karo
                              </button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
                
                {lowStockItems.length === 0 && (
                  <div className="no-alerts">
                    <span className="no-alerts-icon">✅</span>
                    Sab theek hai! Koi bhi dawai low stock nahi hai.
                  </div>
                )}
              </div>
            )}
          </div>

          {/* ADD/EDIT MODAL */}
          {showAddModal && (
            <div className="modal-overlay" onClick={() => { setShowAddModal(false); setEditId(null); }}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <div className="modal-title">
                  {editId ? "✏️ Dawai Edit Karo" : "➕ Nayi Dawai Add Karo"}
                </div>
                <div className="form-grid">
                  {[
                    { label: "Dawai Ka Naam *", key: "name", placeholder: "e.g. Paracetamol 500mg", full: true },
                    { label: "Stock Quantity *", key: "stock", placeholder: "e.g. 100", type: "number" },
                    { label: "Price (₹) *", key: "price", placeholder: "e.g. 5.50", type: "number" },
                    { label: "Min Stock Alert", key: "minStock", placeholder: "e.g. 30", type: "number" },
                    { label: "Supplier Ka Naam", key: "supplier", placeholder: "e.g. Sun Pharma" },
                    { label: "Supplier Phone", key: "supplierPhone", placeholder: "e.g. 9876543210" },
                    { label: "Expiry Date", key: "expiry", type: "date" },
                  ].map(f => (
                    <div key={f.key} className={`form-group ${f.full ? 'full' : ''}`}>
                      <label className="form-label">{f.label}</label>
                      <input 
                        className="inp"                         type={f.type || "text"} 
                        placeholder={f.placeholder} 
                        value={newMed[f.key]} 
                        onChange={e => setNewMed({ ...newMed, [f.key]: e.target.value })} 
                      />
                    </div>
                  ))}
                  <div className="form-group">
                    <label className="form-label">Category</label>
                    <select 
                      className="inp" 
                      value={newMed.category} 
                      onChange={e => setNewMed({ ...newMed, category: e.target.value })}
                    >
                      {["Tablet", "Capsule", "Syrup", "Injection", "Ointment", "Drops", "Other"].map(c => (
                        <option key={c} value={c}>{c}</option>
                      ))}
                    </select>
                  </div>
                </div>
                <div className="modal-actions">
                  <button className="btn-secondary" onClick={() => { setShowAddModal(false); setEditId(null); }}>
                    Cancel
                  </button>
                  <button className="btn-primary" onClick={saveEdit}>
                    {editId ? "✅ Update Karo" : "✅ Add Karo"}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* BILL PREVIEW MODAL */}
          {showBillPreview && (
            <div className="modal-overlay" onClick={() => setShowBillPreview(null)}>
              <div 
                className="bill-preview" 
                onClick={e => e.stopPropagation()} 
                ref={billRef}
              >
                <div className="bill-header">
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#1a237e", fontFamily: "'Baloo 2', cursive" }}>
                    💊 Khan Medicos
                  </div>
                  <div className="bill-subtitle">Trusted Medical Store Since 1995</div>
                  <div style={{ fontWeight: 800, fontSize: 18, marginTop: 8 }}>BILL / RECEIPT</div>
                </div>
                
                <div className="bill-details">
                  <div><b>Bill No:</b> {showBillPreview.id}</div>                  <div><b>Date:</b> {showBillPreview.date}</div>
                  <div><b>Patient:</b> {showBillPreview.patient}</div>
                  {showBillPreview.phone && <div><b>Phone:</b> {showBillPreview.phone}</div>}
                </div>
                
                <table className="bill-table">
                  <thead>
                    <tr>
                      <th style={{ width: "50%" }}>Dawai</th>
                      <th style={{ width: "15%", textAlign: "center" }}>Qty</th>
                      <th style={{ width: "15%", textAlign: "center" }}>Rate</th>
                      <th style={{ width: "20%", textAlign: "right" }}>Amount</th>
                    </tr>
                  </thead>
                  <tbody>
                    {showBillPreview.items.map(i => (
                      <tr key={i.id}>
                        <td style={{ fontWeight: 500 }}>{i.name}</td>
                        <td style={{ textAlign: "center" }}>{i.qty}</td>
                        <td style={{ textAlign: "center" }}>₹{i.price.toFixed(2)}</td>
                        <td style={{ textAlign: "right", fontWeight: 600 }}>₹{(i.price * i.qty).toFixed(2)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                
                <div className="bill-total">
                  <div className="bill-total-row">
                    <span>Subtotal:</span>
                    <span>₹{showBillPreview.subtotal.toFixed(2)}</span>
                  </div>
                  <div className="bill-total-row">
                    <span>GST (5%):</span>
                    <span>₹{showBillPreview.gst.toFixed(2)}</span>
                  </div>
                  <div className="bill-total-row bill-grand-total">
                    <span>TOTAL:</span>
                    <span>₹{showBillPreview.total.toFixed(2)}</span>
                  </div>
                </div>
                
                <div className="bill-footer">
                  Aapki sehat hi hamari pehli zimmedari hai. Get well soon! 🙏<br/>
                  Khan Medicos • Contact: 9876543210 • Address: Main Market, City
                </div>
                
                <div className="bill-actions">
                  <button className="btn-primary bill-print-btn" onClick={printBill}>
                    🖨️ Print Karo
                  </button>                  <button className="btn-secondary" onClick={() => setShowBillPreview(null)}>
                    Band Karo
                  </button>
                </div>
              </div>
            </div>
          )}
          
          <div className="footer-note no-print">
            © {new Date().getFullYear()} Khan Medicos • Medical Inventory Management System • 
            Designed with ❤️ for better healthcare
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
